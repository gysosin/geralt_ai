<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Geralt AI - Intelligent Document Assistant powered by AI" />
    <meta name="theme-color" content="#6366f1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <title>Geralt AI - Intelligent Document Assistant</title>
    <style>
      /* Prevent FOUC */
      html { visibility: hidden; }
      html.light, html.dark { visibility: visible; }
    </style>
    <script>
      // Prevent FOUC by setting theme before render
      (function() {
        try {
          var stored = localStorage.getItem('theme-storage');
          if (stored) {
            var state = JSON.parse(stored).state;
            var theme = state.theme;
            if (theme === 'dark') {
              document.documentElement.classList.add('dark');
              document.documentElement.classList.remove('light');
            } else if (theme === 'system') {
              var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
              document.documentElement.classList.add(systemDark ? 'dark' : 'light');
              document.documentElement.classList.remove(systemDark ? 'light' : 'dark');
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
